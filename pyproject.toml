[project]
name = "aion-model-gateway"
version = "0.1.0"
description = "Hardened local LiteLLM gateway for free/trial LLM provider routing."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Aion Model Gateway contributors" }]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py310"
# generate_site.py is upstream code that builds the availability site; it's
# regenerated by the update-models.yml bot, so we don't lint/format it here.
extend-exclude = ["docs", ".venv", "snapshots", "generate_site.py"]

[tool.ruff.lint]
# Keep the bar reasonable for a sync script: correctness + obvious bugs.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (unused imports, undefined names)
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",   # line length handled by formatter; we don't want noisy line-wrap edits
    "B008",   # function call in default arg (used for some fetchers)
]

[tool.ruff.lint.per-file-ignores]
"sync_models.py" = ["B904"]   # raise-from ergonomics in defensive excepts
"tests/*" = ["E402"]          # tests may import after sys.path tweaks
